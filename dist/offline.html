<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digi Sanctuary - Offline</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Outfit', sans-serif;
      background-color: #FAF8FF;
      color: #1D1A25;
      text-align: center;
      padding: 20px;
    }
    h1 {
      color: #9373B5;
      margin-bottom: 8px;
    }
    p {
      color: #49454F;
      max-width: 400px;
      line-height: 1.5;
    }
    .circle {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background-color: #C4B5E0;
      margin-bottom: 32px;
      animation: pulse 3s infinite ease-in-out;
    }
    @keyframes pulse {
      0% { transform: scale(0.9); opacity: 0.7; }
      50% { transform: scale(1.1); opacity: 1; }
      100% { transform: scale(0.9); opacity: 0.7; }
    }
  </style>
</head>
<body>
  <div class="circle"></div>
  <h1>You're Offline</h1>
  <p>Take a deep breath. Connect to the internet to fully experience your digital sanctuary when you're ready.</p>
</body>
</html>
